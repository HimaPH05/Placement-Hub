<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Placement Hub | Company Signup</title>
  <link rel="stylesheet" href="company-signup.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0e4ccf">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Placement Hub">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <script defer src="pwa-register.js"></script>
</head>

<body>
  <div class="container">

    <!-- Page Title -->
    

    <!-- Signup Card -->
    <form id="companySignupForm" class="card" action="company-signup.php" method="post">
        <h2>Placement Hub</h2>
      <h3>Create Company Account</h3>

      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Create username" required>

      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Create password" required>
        <span id="togglePassword" role="button" tabindex="0" aria-label="Toggle password visibility">&#128065;</span>
      </div>

      <label for="companyName">Company Name</label>
      <input type="text" id="companyName" placeholder="Enter company name" required>

      <label for="email">Company Email</label>
      <input type="email" id="email" placeholder="Enter official email" required>

      <label for="phone">Contact Number</label>
      <input type="tel" id="phone" placeholder="Enter contact number" required>

      <label for="location">Company Location</label>
      <input type="text" id="location" placeholder="Enter company location" required>

      <label for="industry">Industry Type</label>
      <input type="text" id="industry" list="industryOptions" placeholder="Select or type industry" required>
      <datalist id="industryOptions">
        <option value="Information Technology"></option>
        <option value="Software Development"></option>
        <option value="Artificial Intelligence"></option>
        <option value="Data Science & Analytics"></option>
        <option value="Finance & Banking"></option>
        <option value="FinTech"></option>
        <option value="Healthcare"></option>
        <option value="Pharmaceutical"></option>
        <option value="Manufacturing"></option>
        <option value="Automobile"></option>
        <option value="Electronics"></option>
        <option value="Telecommunications"></option>
        <option value="Education"></option>
        <option value="E-Commerce"></option>
        <option value="Retail"></option>
        <option value="Logistics & Supply Chain"></option>
        <option value="Media & Entertainment"></option>
        <option value="Marketing & Advertising"></option>
        <option value="Consulting"></option>
        <option value="Energy & Utilities"></option>
        <option value="Government / Public Sector"></option>
      </datalist>

      <label for="website">Company Website</label>
      <input type="url" id="website" placeholder="https://example.com">

      <button type="submit">Create Account</button>

      <p class="switch">
        Already have an account?
        <a href="login.php">Login</a>
      </p>

      <p id="error" class="error"></p>
    </form>
  </div>

  <script src="company-signup.js"></script>
</body>
</html>
