      Share your placement experience or suggestions to help us improve.
    </p>

    <div class="rating-wrap">
      <label>Rating</label>
      <div class="star-rating" id="feedbackStars" role="radiogroup" aria-label="Feedback rating">
        <button type="button" class="star-btn" data-rating="1" aria-label="1 star">&#9733;</button>
        <button type="button" class="star-btn" data-rating="2" aria-label="2 stars">&#9733;</button>
        <button type="button" class="star-btn" data-rating="3" aria-label="3 stars">&#9733;</button>
        <button type="button" class="star-btn" data-rating="4" aria-label="4 stars">&#9733;</button>
        <button type="button" class="star-btn" data-rating="5" aria-label="5 stars">&#9733;</button>
      </div>
      <input type="hidden" id="feedbackRating" value="">
      <p id="feedbackRatingLabel" class="rating-text">Choose a rating</p>
    </div>

    <textarea
      id="fb"
      rows="5"
      placeholder="Write your feedback here..."
    ></textarea>

    <button class="btn" onclick="submitFeedback()">Submit Feedback</button>

    <p id="msg" class="success-msg"></p>

  </div>
