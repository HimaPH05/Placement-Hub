<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Company Management</title>
  <link rel="stylesheet" href="astyle.css">
  <script defer src="script.js"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">
  <div class="logo">Placement Hub Admin</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="company.html" class="active">Company</a>
    <a href="resume.html">Resumes</a>
    <a href="profile.html">Admin Profile</a>
  </nav>
</header>



<!-- ================= MAIN ================= -->

<div class="container">

  <div class="page-head">
    <h2>Company Management</h2>
    <button class="primary" onclick="openModal()">+ Add Company</button>
  </div>

  <!-- Cards appear here -->
  <div id="companyList" class="company-grid"></div>

</div>



<!-- ================= ADD MODAL ================= -->

<div id="modal" class="modal">

  <div class="modal-box">
    <h3>Add Company</h3>

    <input id="name" placeholder="Company Name">
    <input id="email" placeholder="HR Email">
    <input id="cgpa" placeholder="Minimum CGPA">

    <div class="modal-actions">
      <button class="primary" onclick="addCompany()">Save</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>

</div>


</body>
</html>
